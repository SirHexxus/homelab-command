[switch]
tplink-sw ansible_host=10.0.10.50

[switch:vars]
ansible_user                = admin
ansible_password            = "{{ vault_switch_password }}"
ansible_connection          = ansible.netcommon.network_cli
ansible_network_os          = community.tplink.tplink
ansible_become              = no
# Force paramiko transport — system OpenSSH 10.x rejects the switch's firmware DSA
# host key (non-standard p bit length). Paramiko bypasses the OpenSSH binary entirely.
# See README.md for full context on the SSH host key issue.
ansible_ssh_common_args     = '-o StrictHostKeyChecking=no -o KexAlgorithms=+diffie-hellman-group14-sha1 -o HostKeyAlgorithms=+ssh-rsa'
gather_facts                = no
