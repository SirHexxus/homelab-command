[switch]
tplink-sw ansible_host=10.0.10.50

[switch:vars]
ansible_user                = admin
ansible_password            = "{{ vault_switch_password }}"
# local connection — all tasks use ansible.netcommon.telnet module with delegate_to: localhost.
# SSH is permanently broken on this firmware (DSA-only host key, non-standard p bit length;
# OpenSSH 10.x removed DSA entirely; no firmware fix exists). See README.md for full context.
ansible_connection          = local
