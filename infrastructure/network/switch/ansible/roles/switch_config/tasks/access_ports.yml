---
# Configure known access ports with their assigned VLANs.
#
# Each access port requires two commands:
#   switchport general allowed vlan X untagged  — permits untagged frames for VLAN X
#   switchport pvid X                           — tags incoming untagged frames as VLAN X
#
# Both must match. A mismatch (e.g. pvid 20 but VLAN 20 not in allowed untagged
# list) results in frames being dropped on ingress.
#
# No tasks are written for unconfigured ports to keep the playbook non-destructive.
# Add entries to switch_access_ports in group_vars/switch.yml when new ports are assigned.

- name: "SWITCH | Build access port command list"
  ansible.builtin.set_fact:
    _access_cmds: >-
      {{ _access_cmds | default([]) + [
        'interface ' + item.port,
        'switchport general allowed vlan ' + (item.vlan | string) + ' untagged',
        'switchport pvid ' + (item.vlan | string),
        'exit'
      ] }}
  loop: "{{ switch_access_ports }}"
  loop_control:
    label: "{{ item.port }} → VLAN {{ item.vlan }}"

- name: "SWITCH | Configure access ports"
  ansible.netcommon.telnet:
    host: "{{ ansible_host }}"
    user: "{{ ansible_user }}"
    password: "{{ ansible_password }}"
    login_prompt: "User:"
    password_prompt: "Password:"
    prompts:
      - "T1600G-28PS"
    crlf: true
    command: "{{ ['enable', 'configure'] + _access_cmds + ['exit'] }}"
  delegate_to: localhost
