---
# Ensure all required VLANs exist on the switch.
#
# The T1600G-28PS `vlan <id>` command is idempotent — reissuing it for a VLAN
# that already exists enters VLAN config sub-mode without creating a duplicate.
# VLANs 20, 30, and 50 pre-exist from initial web UI setup; they are included
# in switch_vlans so this file remains the single source of truth.
#
# All VLAN commands are sent in one Telnet session for efficiency.

- name: "SWITCH | Build VLAN command list"
  ansible.builtin.set_fact:
    _vlan_cmds: "{{ _vlan_cmds | default([]) + ['vlan ' + (item.id | string), 'name ' + item.name, 'exit'] }}"
  loop: "{{ switch_vlans }}"
  loop_control:
    label: "VLAN {{ item.id }} — {{ item.name }}"

- name: "SWITCH | Configure VLANs"
  ansible.netcommon.telnet:
    host: "{{ ansible_host }}"
    user: "{{ ansible_user }}"
    password: "{{ ansible_password }}"
    login_prompt: "User:"
    password_prompt: "Password:"
    prompts:
      - "T1600G-28PS"
    crlf: true
    command: "{{ ['enable', 'configure'] + _vlan_cmds + ['exit'] }}"
  delegate_to: localhost
