---
# Persist running configuration to startup configuration.
#
# Without this step, all changes made during the playbook run are lost on the
# next switch reboot. This task runs last to ensure only a fully successful
# configuration is persisted.
#
# The T1600G-28PS prompts for [Y/N] confirmation when overwriting startup-config.

- name: "SWITCH | Save running config to startup config"
  ansible.netcommon.telnet:
    host: "{{ ansible_host }}"
    user: "{{ ansible_user }}"
    password: "{{ ansible_password }}"
    login_prompt: "User:"
    password_prompt: "Password:"
    prompts:
      - "T1600G-28PS"
    crlf: true
    command:
      - enable
      - copy running-config startup-config
  delegate_to: localhost
