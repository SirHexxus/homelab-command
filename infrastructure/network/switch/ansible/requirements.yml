---
# Ansible collections required for switch management.
#
# Install with:
#   ansible-galaxy collection install -r requirements.yml
#
# ansible.netcommon provides the ansible.netcommon.telnet module used to
# send CLI commands to the switch over Telnet (port 23).
#
# community.tplink does not exist on Ansible Galaxy — it was a false lead.
# The switch uses local connection + ansible.netcommon.telnet module instead.

collections:
  - name: ansible.netcommon
