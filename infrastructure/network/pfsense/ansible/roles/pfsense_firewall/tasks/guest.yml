---
# GUEST (VLAN 70) — internet only, no internal access.
#
# Rule order:
#   1. Allow GUEST → own gateway (10.0.70.1) — DNS, DHCP, pfSense captive portal if added
#   2. Block GUEST → ALL_RFC1918 alias (blocks all private ranges)
#   3. Allow GUEST → pfSense DNS resolver (10.0.70.1:53)
#   4. Allow GUEST → any (internet outbound)
#   5. Allow MANAGEMENT → GUEST (on MANAGEMENT interface — enables monitoring/admin)
#
# Rule 1 must precede rule 2: the gateway IP falls inside RFC1918, so without the
# explicit allow first, DHCP renewal and DNS would be blocked by the alias rule.

# Remove stale per-VLAN block rules replaced by the ALL_RFC1918 alias approach.
- name: "GUEST | Remove legacy per-VLAN block rules"
  pfsensible.core.pfsense_rule:
    name: "Block GUEST to {{ item }}"
    interface: "{{ pfsense_guest_interface }}"
    state: absent
  loop:
    - MANAGEMENT
    - PERSONAL
    - WORK
    - IOT
    - LAB_SERVICES
    - DMZ
    - SANDBOX
  loop_control:
    label: "Remove Block GUEST to {{ item }}"

- name: "GUEST | Allow GUEST → own gateway ({{ pfsense_guest_dns }})"
  pfsensible.core.pfsense_rule:
    name: "Allow GUEST to gateway"
    action: pass
    interface: "{{ pfsense_guest_interface }}"
    source: any
    destination: "{{ pfsense_guest_dns }}"
    protocol: any
    after: top
    state: present

- name: "GUEST | Block GUEST → ALL_RFC1918"
  pfsensible.core.pfsense_rule:
    name: "Block GUEST to ALL_RFC1918"
    action: block
    interface: "{{ pfsense_guest_interface }}"
    source: any
    destination: ALL_RFC1918
    protocol: any
    after: "Allow GUEST to gateway"
    state: present

- name: "GUEST | Allow GUEST → pfSense DNS resolver ({{ pfsense_guest_dns }}:53)"
  pfsensible.core.pfsense_rule:
    name: "Allow GUEST DNS"
    action: pass
    interface: "{{ pfsense_guest_interface }}"
    source: any
    destination: "{{ pfsense_guest_dns }}"
    destination_port: "53"
    protocol: "tcp/udp"
    after: "Block GUEST to ALL_RFC1918"
    state: present

- name: "GUEST | Allow GUEST → any (internet outbound)"
  pfsensible.core.pfsense_rule:
    name: "Allow GUEST internet"
    action: pass
    interface: "{{ pfsense_guest_interface }}"
    source: any
    destination: any
    protocol: any
    after: "Allow GUEST DNS"
    state: present

- name: "MANAGEMENT | Allow MANAGEMENT → GUEST"
  pfsensible.core.pfsense_rule:
    name: "Allow MANAGEMENT to GUEST"
    action: pass
    interface: "{{ pfsense_management_interface }}"
    source: any
    destination: "{{ pfsense_guest_subnet }}"
    protocol: any
    state: present
