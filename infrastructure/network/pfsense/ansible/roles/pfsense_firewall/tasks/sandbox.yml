---
# SANDBOX (VLAN 66) — complete isolation.
#
# One rule blocks all outbound. Inbound is blocked by pfSense default deny.
# Per-device inbound exceptions are added manually as needed.

- name: "SANDBOX | Block all outbound"
  pfsensible.core.pfsense_rule:
    name: "Block SANDBOX outbound"
    action: block
    interface: "{{ pfsense_sandbox_interface }}"
    source: any
    destination: any
    protocol: any
    after: top
    state: present
