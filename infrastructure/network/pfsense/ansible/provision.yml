---
# pfSense provisioning playbook.
#
# Usage:
#   Single interface (firewall rules only):
#     ansible-playbook provision.yml --tags management
#     ansible-playbook provision.yml --tags work
#     ansible-playbook provision.yml --tags lab_services
#     ansible-playbook provision.yml --tags personal
#     ansible-playbook provision.yml --tags iot
#     ansible-playbook provision.yml --tags dmz
#     ansible-playbook provision.yml --tags sandbox
#     ansible-playbook provision.yml --tags guest
#     ansible-playbook provision.yml --tags media
#
#   Aliases only:
#     ansible-playbook provision.yml --tags aliases
#
#   Full run (all VLANs and firewall rules):
#     ansible-playbook provision.yml
#
#   Dry-run (no changes applied):
#     ansible-playbook provision.yml --check
#
# Prerequisites:
#   1. Install collection: ansible-galaxy collection install -r requirements.yml
#
# See README.md for pfSense one-time manual prerequisites.

- name: Provision pfSense VLANs and firewall rules
  hosts: pfsense
  gather_facts: false

  roles:
    - role: pfsense_vlans
      tags: [vlans, dmz, sandbox, guest, media]

    - role: pfsense_interfaces
      tags: [interfaces, dmz, sandbox, guest, media]

    - role: pfsense_firewall
      tags: [firewall, aliases, management, work, lab_services, personal, iot, dmz, sandbox, guest, media]
