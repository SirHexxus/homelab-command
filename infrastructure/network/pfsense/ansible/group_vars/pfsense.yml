---
# Source of truth: all VLANs and firewall configuration for pfSense.
#
# existing: true  → pre-existing VLAN; documented here but skipped by Ansible
# existing: false → managed by Ansible; will be created/configured
#
# After a new VLAN is confirmed live, flip existing to true so it stays
# documented but is no longer re-touched on subsequent runs.

pfsense_trunk_interface: vtnet1

pfsense_vlans:
  - id: 10
    name: MANAGEMENT
    description: "Management network (native/untagged on vtnet1)"
    gateway: "10.0.10.1"
    subnet: "10.0.10.0/24"
    existing: true

  - id: 20
    name: PERSONAL
    description: "Personal devices"
    gateway: "10.0.20.1"
    subnet: "10.0.20.0/24"
    existing: true

  - id: 30
    name: WORK
    description: "Work devices"
    gateway: "10.0.30.1"
    subnet: "10.0.30.0/24"
    existing: true

  - id: 40
    name: IOT
    description: "IoT devices"
    gateway: "10.0.40.1"
    subnet: "10.0.40.0/24"
    existing: true

  - id: 50
    name: LAB_SERVICES
    description: "Lab services (Proxmox, LXC, VMs)"
    gateway: "10.0.50.1"
    subnet: "10.0.50.0/24"
    existing: true

  - id: 60
    name: DMZ
    description: "Demilitarized zone — public-facing services"
    gateway: "10.0.60.1"
    subnet: "10.0.60.0/24"
    existing: true

  - id: 66
    name: SANDBOX
    description: "Quarantine zone — isolated, no outbound"
    gateway: "10.0.66.1"
    subnet: "10.0.66.0/24"
    existing: false

  - id: 70
    name: GUEST
    description: "Guest Wi-Fi — internet only"
    gateway: "10.0.70.1"
    subnet: "10.0.70.0/24"
    existing: false

# Internal subnets that DMZ must not reach.
# Used by pfsense_firewall role to generate block rules.
# Ordered descending — after: top inserts at position 1 each time, reversing
# the list. Descending here produces ascending VLAN order in the firewall UI.
pfsense_internal_subnets:
  - name: "LAB_SERVICES"
    net: "10.0.50.0/24"
  - name: "IOT"
    net: "10.0.40.0/24"
  - name: "WORK"
    net: "10.0.30.0/24"
  - name: "PERSONAL"
    net: "10.0.20.0/24"
  - name: "MANAGEMENT"
    net: "10.0.10.0/24"

# Interface names — must match pfSense Interfaces > Assignments after provisioning.
pfsense_management_interface: "MANAGEMENT"
pfsense_dmz_interface: "DMZ"
pfsense_sandbox_interface: "SANDBOX"
pfsense_guest_interface: "GUEST"

# DNS resolver addresses — pfSense listens on each VLAN's gateway IP.
pfsense_dmz_dns: "10.0.60.1"
pfsense_guest_dns: "10.0.70.1"

# GUEST subnet — used for MANAGEMENT → GUEST allow rule.
pfsense_guest_subnet: "10.0.70.0/24"

# Subnets that GUEST must not reach (all internal VLANs).
# Ordered descending — after: top reversal produces ascending UI order.
pfsense_guest_internal_subnets:
  - name: "SANDBOX"
    net: "10.0.66.0/24"
  - name: "DMZ"
    net: "10.0.60.0/24"
  - name: "LAB_SERVICES"
    net: "10.0.50.0/24"
  - name: "IOT"
    net: "10.0.40.0/24"
  - name: "WORK"
    net: "10.0.30.0/24"
  - name: "PERSONAL"
    net: "10.0.20.0/24"
  - name: "MANAGEMENT"
    net: "10.0.10.0/24"
