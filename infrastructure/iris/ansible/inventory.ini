# ansible/inventory.ini - Ansible Host Inventory
#
# Helm v2 bare metal device (helm-log, VLAN 10).
#
# NOTE: homelab_ed25519 must be created and copied to the device
# before the first playbook run:
#   ssh-keygen -t ed25519 -f ~/.ssh/homelab_ed25519
#   ssh-copy-id -i ~/.ssh/homelab_ed25519.pub root@10.0.10.25

[iris]
helm-log ansible_host=10.0.10.25 ansible_user=root

[iris:vars]
# SSH configuration
ansible_ssh_private_key_file = ~/.ssh/homelab_ed25519
ansible_ssh_common_args = '-o StrictHostKeyChecking=no'

# Python interpreter
ansible_python_interpreter = /usr/bin/python3
