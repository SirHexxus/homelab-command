# roles/postgres_install/tasks/main.yml
# PostgreSQL installation tasks (called from provision.yml)

---
- name: Add PostgreSQL apt signing key
  apt_key:
    url: https://www.postgresql.org/media/keys/ACCC4CF8.asc
    state: present

- name: Add PostgreSQL apt repository
  apt_repository:
    repo: "deb https://apt.postgresql.org/pub/repos/apt {{ ansible_distribution_release }}-pgdg main"
    state: present
    filename: pgdg

- name: Install PostgreSQL {{ postgres_version | default(16) }}
  apt:
    name: postgresql-{{ postgres_version | default(16) }}
    state: present
    update_cache: yes

- name: Enable and start PostgreSQL
  systemd:
    name: postgresql
    enabled: yes
    state: started
