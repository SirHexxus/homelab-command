# ansible/inventory.ini - Ariadne Host Inventory

[postgres_hosts]
postgres-01 ansible_host=10.0.50.14 ansible_user=root ansible_port=22

[postgres_hosts:vars]
ansible_ssh_private_key_file = ~/.ssh/id_rsa
ansible_ssh_common_args = '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
ansible_python_interpreter = /usr/bin/python3
ansible_connection_timeout = 30

[npm_containers]
npm-01 ansible_host=10.0.60.10 ansible_user=root ansible_port=22

[npm_containers:vars]
ansible_ssh_private_key_file = ~/.ssh/id_rsa
ansible_ssh_common_args = '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
ansible_python_interpreter = /usr/bin/python3
ansible_connection_timeout = 30
ansible_become = true
ansible_become_user = root
ansible_become_method = sudo

[authelia_containers]
authelia-01 ansible_host=10.0.60.11 ansible_user=root ansible_port=22

[authelia_containers:vars]
ansible_ssh_private_key_file = ~/.ssh/id_rsa
ansible_ssh_common_args = '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
ansible_python_interpreter = /usr/bin/python3
ansible_connection_timeout = 30
ansible_become = true
ansible_become_user = root
ansible_become_method = sudo

[umami_containers]
