# roles/authelia/tasks/main.yml
# Authelia native binary installation

---
- name: Create authelia system group
  group:
    name: "{{ authelia_group }}"
    system: yes
    state: present

- name: Create authelia system user
  user:
    name: "{{ authelia_user }}"
    group: "{{ authelia_group }}"
    system: yes
    shell: /usr/sbin/nologin
    home: "{{ authelia_data_dir }}"
    create_home: no
    state: present

- name: Create authelia config directory
  file:
    path: "{{ authelia_config_dir }}"
    state: directory
    owner: "{{ authelia_user }}"
    group: "{{ authelia_group }}"
    mode: '0750'

- name: Create authelia data directory
  file:
    path: "{{ authelia_data_dir }}"
    state: directory
    owner: "{{ authelia_user }}"
    group: "{{ authelia_group }}"
    mode: '0750'

- name: Download authelia binary archive
  get_url:
    url: "https://github.com/authelia/authelia/releases/download/v{{ authelia_version }}/authelia-v{{ authelia_version }}-linux-amd64.tar.gz"
    dest: "/tmp/authelia-v{{ authelia_version }}-linux-amd64.tar.gz"
    mode: '0644'

- name: Extract authelia binary to /usr/local/bin
  unarchive:
    src: "/tmp/authelia-v{{ authelia_version }}-linux-amd64.tar.gz"
    dest: /usr/local/bin
    remote_src: yes
    extra_opts:
      - --strip-components=0
    creates: /usr/local/bin/authelia

- name: Set authelia binary permissions
  file:
    path: /usr/local/bin/authelia
    owner: root
    group: root
    mode: '0755'

- name: Deploy authelia configuration
  template:
    src: configuration.yml.j2
    dest: "{{ authelia_config_dir }}/configuration.yml"
    owner: "{{ authelia_user }}"
    group: "{{ authelia_group }}"
    mode: '0640'
  notify: restart authelia

- name: Check if users_database.yml already exists
  stat:
    path: "{{ authelia_data_dir }}/users_database.yml"
  register: users_db_stat

- name: Deploy initial users database (only if not present)
  template:
    src: users_database.yml.j2
    dest: "{{ authelia_data_dir }}/users_database.yml"
    owner: "{{ authelia_user }}"
    group: "{{ authelia_group }}"
    mode: '0600'
  when: not users_db_stat.stat.exists

- name: Deploy authelia systemd service unit
  template:
    src: authelia.service.j2
    dest: /etc/systemd/system/authelia.service
    owner: root
    group: root
    mode: '0644'
  notify: restart authelia

- name: Reload systemd daemon
  systemd:
    daemon_reload: yes

- name: Enable and start authelia service
  systemd:
    name: authelia
    enabled: yes
    state: started

- name: Wait for authelia to be ready
  uri:
    url: "http://localhost:{{ authelia_port }}"
    status_code: [200, 302, 401]
  register: authelia_health
  until: authelia_health.status in [200, 302, 401]
  retries: 20
  delay: 3
  changed_when: false
