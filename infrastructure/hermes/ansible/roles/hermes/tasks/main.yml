# roles/hermes/tasks/main.yml - Hermes Installation Tasks

# =============================================================================
# 1. SYSTEM USER & GROUP
# =============================================================================

- name: Create hermes system group
  group:
    name: "{{ hermes_group }}"
    system: yes
    state: present

- name: Create hermes system user
  user:
    name: "{{ hermes_user }}"
    group: "{{ hermes_group }}"
    system: yes
    home: /nonexistent
    create_home: no
    shell: /usr/sbin/nologin
    state: present

# =============================================================================
# 2. PYTHON 3.12
# =============================================================================

- name: Add deadsnakes PPA for Python 3.12
  apt_repository:
    repo: ppa:deadsnakes/ppa
    state: present
  when: ansible_os_family == "Debian"

- name: Install Python 3.12
  apt:
    name:
      - python3.12
      - python3.12-venv
      - python3.12-dev
    state: present
    update_cache: yes
  when: ansible_os_family == "Debian"

# =============================================================================
# 3. CLONE REPOSITORY
# Clone as root so /opt/hermes is created cleanly, then fix ownership.
# =============================================================================

- name: Mark install dir as git safe directory
  command: git config --system --add safe.directory {{ hermes_install_dir }}
  changed_when: false

- name: Clone or update homelab-command repository
  git:
    repo: "{{ hermes_repo }}"
    dest: "{{ hermes_install_dir }}"
    version: main
    update: yes
    force: no

- name: Set ownership of install directory
  file:
    path: "{{ hermes_install_dir }}"
    state: directory
    owner: "{{ hermes_user }}"
    group: "{{ hermes_group }}"
    recurse: yes

- name: Create hermes log directory
  file:
    path: "{{ hermes_log_dir }}"
    state: directory
    owner: "{{ hermes_user }}"
    group: "{{ hermes_group }}"
    mode: '0755'

# =============================================================================
# 3b. WIKI REPOSITORY
# Clone the Mnemosyne wiki repo to /opt/hermes/wiki. The hermes system user
# has home=/nonexistent, so SSH config lives under /opt/hermes/.ssh/ instead.
# The deploy key grants write access to the private mnemosyne-wiki GitHub repo.
# =============================================================================

- name: Create Hermes SSH directory
  file:
    path: /opt/hermes/.ssh
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Deploy wiki SSH deploy key
  copy:
    content: "{{ vault_wiki_deploy_key | b64decode }}"
    dest: /opt/hermes/.ssh/wiki_deploy
    owner: "{{ hermes_user }}"
    group: "{{ hermes_group }}"
    mode: '0600'

- name: Fetch github.com SSH host key
  command: ssh-keyscan -t ed25519 github.com
  register: github_keyscan
  changed_when: false
  failed_when: github_keyscan.rc != 0 or github_keyscan.stdout == ''

- name: Add github.com to Hermes known_hosts
  known_hosts:
    path: /opt/hermes/.ssh/known_hosts
    name: github.com
    key: "{{ github_keyscan.stdout }}"
    state: present

- name: Set known_hosts ownership
  file:
    path: /opt/hermes/.ssh/known_hosts
    owner: "{{ hermes_user }}"
    group: "{{ hermes_group }}"
    mode: '0644'

- name: Clone Mnemosyne wiki repository
  command: git clone git@github.com:SirHexxus/mnemosyne-wiki.git /opt/hermes/wiki
  args:
    creates: /opt/hermes/wiki/.git
  environment:
    GIT_SSH_COMMAND: >-
      ssh -i /opt/hermes/.ssh/wiki_deploy
      -o UserKnownHostsFile=/opt/hermes/.ssh/known_hosts
      -o StrictHostKeyChecking=yes

- name: Set ownership of wiki directory
  file:
    path: /opt/hermes/wiki
    state: directory
    owner: "{{ hermes_user }}"
    group: "{{ hermes_group }}"
    recurse: yes

- name: Configure wiki repo to use deploy key for future push/pull
  ini_file:
    path: /opt/hermes/wiki/.git/config
    section: core
    option: sshCommand
    value: >-
      ssh -i /opt/hermes/.ssh/wiki_deploy
      -o UserKnownHostsFile=/opt/hermes/.ssh/known_hosts
      -o StrictHostKeyChecking=yes
    owner: "{{ hermes_user }}"
    group: "{{ hermes_group }}"

# =============================================================================
# 4. PYTHON VIRTUAL ENVIRONMENT
# =============================================================================

- name: Check if venv exists with correct Python version
  stat:
    path: "{{ hermes_venv_dir }}/bin/python3.12"
  register: venv_python312

- name: Remove old venv if created with wrong Python version
  file:
    path: "{{ hermes_venv_dir }}"
    state: absent
  when: not venv_python312.stat.exists

- name: Create Python 3.12 virtual environment
  command: python3.12 -m venv {{ hermes_venv_dir }}
  args:
    creates: "{{ hermes_venv_dir }}/bin/activate"
  become: yes
  become_user: "{{ hermes_user }}"

- name: Upgrade pip in virtual environment
  pip:
    name:
      - pip
      - setuptools
      - wheel
    state: latest
    virtualenv: "{{ hermes_venv_dir }}"
  become: yes
  become_user: "{{ hermes_user }}"

- name: Install Hermes dependencies
  pip:
    requirements: "{{ hermes_app_dir }}/requirements.txt"
    virtualenv: "{{ hermes_venv_dir }}"
  become: yes
  become_user: "{{ hermes_user }}"

# =============================================================================
# 5. CONFIGURATION
# =============================================================================

- name: Ensure config/contexts directory exists
  file:
    path: "{{ hermes_config_dir }}/contexts"
    state: directory
    owner: "{{ hermes_user }}"
    group: "{{ hermes_group }}"
    mode: '0750'

- name: Template global config
  template:
    src: config.yml.j2
    dest: "{{ hermes_config_dir }}/config.yml"
    owner: "{{ hermes_user }}"
    group: "{{ hermes_group }}"
    mode: '0640'
  notify: restart hermes service

- name: Template personal context
  template:
    src: personal.yml.j2
    dest: "{{ hermes_config_dir }}/contexts/personal.yml"
    owner: "{{ hermes_user }}"
    group: "{{ hermes_group }}"
    mode: '0640'
  notify: restart hermes service

- name: Template professional context
  template:
    src: professional.yml.j2
    dest: "{{ hermes_config_dir }}/contexts/professional.yml"
    owner: "{{ hermes_user }}"
    group: "{{ hermes_group }}"
    mode: '0640'
  notify: restart hermes service

# =============================================================================
# 6. SYSTEMD SERVICE
# Phase 1: gated by hermes_deploy_service (false until web_app.py exists)
# Phase 4: set hermes_deploy_service: true in group_vars/hermes_containers.yml
# =============================================================================

- name: Install hermes systemd service
  template:
    src: hermes.service.j2
    dest: /etc/systemd/system/hermes.service
    owner: root
    group: root
    mode: '0644'
  notify: restart hermes service
  when: hermes_deploy_service | default(false)

- name: Reload systemd daemon
  systemd:
    daemon_reload: yes
  when: hermes_deploy_service | default(false)

- name: Enable and start hermes service
  systemd:
    name: hermes
    enabled: yes
    state: started
  when: hermes_deploy_service | default(false)

# =============================================================================
# 7. CLI WRAPPER
# Installs /usr/local/bin/hermes so root can call `hermes "task"` directly.
# Always runs — Phase 1 primary entrypoint.
# =============================================================================

- name: Install /usr/local/bin/hermes CLI wrapper
  copy:
    dest: /usr/local/bin/hermes
    mode: '0755'
    owner: root
    group: root
    content: |
      #!/bin/bash
      source {{ hermes_venv_dir }}/bin/activate
      exec {{ hermes_app_dir }}/bin/hermes "$@"
