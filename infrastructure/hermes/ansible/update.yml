# ansible/update.yml - Hermes Maintenance Playbook
#
# Run this playbook to pull the latest code and restart the service:
#   ansible-playbook -i inventory.ini update.yml --ask-vault-pass

---
- name: Update Hermes AI Agent Container
  hosts: hermes_containers

  vars:
    apt_cache_valid_time: 3600

  pre_tasks:
    - name: Display update start message
      debug:
        msg: |
          ============================================================
          Starting Hermes Container Update
          ============================================================
          Target: {{ inventory_hostname }}
          Time: {{ ansible_date_time.iso8601 }}
          ============================================================

  tasks:
    # =========================================================================
    # 1. SYSTEM UPDATES
    # =========================================================================
    - name: Update package cache
      apt:
        update_cache: yes
        cache_valid_time: "{{ apt_cache_valid_time }}"

    - name: Upgrade all system packages
      apt:
        upgrade: dist
        autoremove: yes
        autoclean: yes
      register: apt_upgrade

    - name: Display apt upgrade result
      debug:
        msg: "System packages updated: {{ apt_upgrade.changed }}"

    # =========================================================================
    # 2. PULL LATEST CODE
    # =========================================================================
    - name: Stop hermes service before update
      systemd:
        name: hermes
        state: stopped

    - name: Pull latest code from repository
      git:
        repo: "{{ hermes_repo }}"
        dest: "{{ hermes_install_dir }}"
        version: main
        force: no
      become: yes
      become_user: "{{ hermes_user }}"
      register: git_pull

    - name: Display git pull result
      debug:
        msg: "Code updated: {{ git_pull.changed }} ({{ git_pull.after[:8] }})"

    # =========================================================================
    # 3. UPDATE PYTHON DEPENDENCIES
    # =========================================================================
    - name: Upgrade pip packages
      pip:
        name:
          - pip
          - setuptools
          - wheel
        state: latest
        virtualenv: "{{ hermes_venv_dir }}"
      become: yes
      become_user: "{{ hermes_user }}"

    - name: Install/update Hermes dependencies
      pip:
        requirements: "{{ hermes_app_dir }}/requirements.txt"
        virtualenv: "{{ hermes_venv_dir }}"
      become: yes
      become_user: "{{ hermes_user }}"
      register: pip_update

    - name: Display pip update result
      debug:
        msg: "Python packages updated: {{ pip_update.changed }}"

    # =========================================================================
    # 4. RESTART SERVICE
    # =========================================================================
    - name: Start hermes service
      systemd:
        name: hermes
        state: started

    - name: Wait for service to be ready
      uri:
        url: "http://localhost:{{ hermes_port }}/health"
        status_code: [200]
      register: health_check
      until: health_check.status == 200
      retries: 30
      delay: 5
      changed_when: false

    # =========================================================================
    # 5. VERIFY & REPORT
    # =========================================================================
    - name: Check disk usage
      command: df -h /
      register: disk_usage
      changed_when: false

    - name: Check memory usage
      command: free -h
      register: memory_usage
      changed_when: false

    - name: Display update summary
      debug:
        msg: |
          ============================================================
          Hermes Container Update Complete
          ============================================================

          Code: {{ git_pull.after[:8] }} (changed: {{ git_pull.changed }})

          System Resources:
          {{ disk_usage.stdout }}

          Memory:
          {{ memory_usage.stdout }}

          Service Status: Running (health check passed)

          ============================================================
