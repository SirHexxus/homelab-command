# provision.yml - inbox-receiver deployment
#
# Installs and configures the Mnemosyne inbox receiver on a fresh LXC.
# Run after Terraform creates the container:
#
#   ansible-playbook -i inventory.ini provision.yml --ask-vault-pass

---
- name: Provision Mnemosyne inbox-receiver
  hosts: inbox_receiver
  vars_files:
    - group_vars/vault.yml

  pre_tasks:
    - name: Update package cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install system dependencies
      apt:
        name:
          - python3
          - python3-pip
          - python3-venv
          - git
          - curl
        state: present

  tasks:
    # =========================================================================
    # 1. DOTFILES
    # =========================================================================
    - name: Install dotfiles for root
      import_role:
        name: dotfiles

    # =========================================================================
    # 2. INBOX RECEIVER APP
    # =========================================================================
    - name: Install inbox-receiver
      include_role:
        name: inbox_receiver

    # =========================================================================
    # 3. HEALTH CHECK
    # =========================================================================
    - name: Wait for inbox-receiver to be ready
      uri:
        url: "http://localhost:{{ app_port }}/health"
        status_code: [200]
        timeout: 10
      register: health_check
      until: health_check.status is defined and health_check.status == 200
      retries: 20
      delay: 3
      changed_when: false

    - name: Display connection info
      debug:
        msg: |
          ============================================================
          inbox-receiver provisioning complete!
          Endpoint: http://10.0.50.19:{{ app_port }}/inbox
          Health:   http://10.0.50.19:{{ app_port }}/health
          ============================================================
