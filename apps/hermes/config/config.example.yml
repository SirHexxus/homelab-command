# Hermes global configuration
# Copy this file to config/config.yml and fill in your values.

# The context used when --context is not specified on the CLI
default_context: personal

# Ollama server URL
ollama_base_url: "http://10.0.50.10:11434"

# ── LLM Tier API keys ──────────────────────────────────────────────────────────

# Gemini API key (Tier 2 — wiki_write, synthesis, report tasks)
# Set here or export GEMINI_API_KEY in the environment (env var takes precedence)
# gemini_api_key: ""

# Claude tier uses `claude -p` subprocess — no API key needed.
# Requires Claude Code installed and authenticated on the host running Hermes.
# Model alias passed to `claude --model` (haiku | sonnet | opus)
claude_model: sonnet

# ── Task-type → LLM tier routing ──────────────────────────────────────────────
#
# Tiers: local (Ollama), gemini, claude
# Fixed tiers (nomic, whisper) are dispatched directly — no waterfall fallback.
#
model_routing:
  classify:     local      # fast classification — Ollama is fine
  wiki_read:    local      # reading pages — Ollama is fine
  wiki_write:   gemini     # writing/integrating pages — needs Gemini Flash
  synthesis:    gemini     # multi-source synthesis
  judgment:     claude     # conflict resolution / editorial judgment
  report:       gemini     # structured report generation
  embed:        nomic      # fixed — nomic-embed-text via Ollama, never cloud
  transcribe:   whisper    # fixed — Whisper LXC (10.0.50.12), never cloud
  default:      local      # fallback for unrecognised task types

# ── Mnemosyne wiki ─────────────────────────────────────────────────────────────
mnemosyne:
  wiki_path: ~/wiki
  wiki_remote: git@github.com:SirHexxus/wiki.git
